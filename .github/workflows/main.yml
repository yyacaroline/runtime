name: Compile on PR Comment
on:
  issue_comment:  # ✅ 正确事件名
    types: [created]

# 必须有的 jobs（解决你第一个报错）
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 只在 PR 评论、且包含 /compile 时执行
      - name: Run compile
        if: >
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/compile')
        run: echo "开始执行编译任务！"
